services:
  - type: web
    name: api-gateway
    env: node
    buildCommand: npm install
    startCommand: node src/index.js # Make sure package.json has a start script or use node directly
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true # Render will generate a strong secret automatically
      - key: REDIS_URL
        fromService:
          type: redis
          name: api-gateway-redis
          property: connectionString

  - type: redis
    name: api-gateway-redis
    ipAllowList: [] # Keep redis completely internal to Render
