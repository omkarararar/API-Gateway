services:
  - type: web
    name: api-gateway
    env: node
    buildCommand: npm install && cd client && npm install && npm run build
    startCommand: node src/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: METRICS_ENABLED
        value: 'true'
      - key: JWT_SECRET
        generateValue: true
      - key: REDIS_URL
        fromService:
          type: redis
          name: api-gateway-redis
          property: connectionString

  - type: redis
    name: api-gateway-redis
    ipAllowList: []
